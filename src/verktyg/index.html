<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8">
    <title>Verktyg - Pownas.se</title>
    <meta name="description" content="Verktygsindex med länkar till undersidor på pownas.se.">
    <meta name="robots" content="follow, noarchive, nosnippet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/favicon.svg">
    <link href="../assets/css/main.css" rel="stylesheet" media="all">
    <meta property="og:image" content="/favicon.svg">
    <meta property="og:type" content="website">
  </head>
  <body>
    <input type="checkbox" id="theme-toggle" class="sr-only">

    <div class="page-shell">
      <header class="hero">
        <div class="hero-top">
          <a class="brand" href="https://www.pownas.se" aria-label="Pownas home">
            <img src="/favicon.svg" alt="pownas.se logo" width="34" height="34">
            <span>Pownas.se</span>
          </a>

          <label for="theme-toggle" class="theme-btn" aria-label="Toggle theme">
            <span class="theme-icon"></span>
          </label>
        </div>

        <div class="hero-content">
          <p class="eyebrow">Tools</p>
          <h1>Verktyg och undersidor</h1>
          <p class="lead">Snabblänkar till alla verktygssektioner.</p>
        </div>
      </header>

      <main id="content" class="content-grid">
        <section class="card tool-index-card" aria-labelledby="toolsHeading">
          <h2 id="toolsHeading">Alla verktygssidor</h2>
          <p id="meta" class="meta"></p>
          <p id="updatedAt" class="updated">Senast uppdaterad: 2026-07-23 00:51 (laddar...)</p>
          <ul id="folderList" class="folder-list"></ul>
        </section>
      </main>

      <footer class="site-footer">
        <p>Created by <a href="https://github.com/pownas" target="_blank" rel="noopener noreferrer">Pownas</a>, 2023-<span id="current-year"></span></p>
        <p>Built with HTML and CSS. Hosted via <a href="https://github.com/pownas/pownas.se-website" target="_blank" rel="noopener noreferrer">GitHub Pages</a>.</p>
      </footer>
    </div>

    <script>
      const indexPages = [
        { name: "Audio visualizer", path: "audio-visualizer/index.html" },
        { name: "Kalkylatorer (Bil, Lån, Sparande)", path: "kalkylator/index.html" },
        { name: "Responsiv webb-tester", path: "responsiv-tester/index.html" },
        { name: "Rich text editor", path: "rich-text-editor/index.html" }
      ];

      const listEl = document.getElementById("folderList");
      const metaEl = document.getElementById("meta");
      const updatedEl = document.getElementById("updatedAt");

      function toFolderHref(path) {
        return "./" + path.replace(/index\.html$/i, "");
      }

      function renderLinks(pages) {
        const sorted = [...pages].sort((a, b) => a.name.localeCompare(b.name, "sv"));
        metaEl.textContent = sorted.length + " undersidor hittades.";

        const fragment = document.createDocumentFragment();

        sorted.forEach((page) => {
          const li = document.createElement("li");
          li.className = "folder-item";

          const textWrap = document.createElement("div");
          const name = document.createElement("div");
          const rawPath = document.createElement("div");

          name.className = "folder-name";
          name.textContent = page.name;

          rawPath.className = "folder-path";
          rawPath.textContent = page.path;

          textWrap.appendChild(name);
          textWrap.appendChild(rawPath);

          const link = document.createElement("a");
          link.className = "open-link";
          link.href = toFolderHref(page.path);
          link.textContent = "Öppna";

          li.appendChild(textWrap);
          li.appendChild(link);
          fragment.appendChild(li);
        });

        listEl.appendChild(fragment);
      }

      function formatDateForSv(dateValue) {
        const date = new Date(dateValue);

        if (Number.isNaN(date.getTime())) {
          return null;
        }

        return new Intl.DateTimeFormat("sv-SE", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        }).format(date);
      }

      async function renderLastUpdated() {
        let sourceValue = "";

        try {
          const response = await fetch(window.location.href, {
            method: "HEAD",
            cache: "no-store"
          });

          if (response.ok) {
            sourceValue = response.headers.get("last-modified") || "";
          }
        } catch (error) {
          // Some static setups block HEAD/CORS; fallback below handles this.
        }

        if (!sourceValue) {
          sourceValue = document.lastModified || "";
        }

        const formatted = formatDateForSv(sourceValue);
        updatedEl.textContent = formatted
          ? "Senast uppdaterad: " + formatted
          : "Senast uppdaterad: okand";
      }

      (function() {
        const themeToggle = document.getElementById("theme-toggle");
        const systemDarkQuery = window.matchMedia("(prefers-color-scheme: dark)");

        function syncThemeWithSystem(e) {
          themeToggle.checked = e.matches;
        }

        syncThemeWithSystem(systemDarkQuery);

        try {
          systemDarkQuery.addEventListener("change", syncThemeWithSystem);
        } catch (err) {
          systemDarkQuery.addListener(syncThemeWithSystem);
        }
      })();

      document.getElementById("current-year").textContent = new Date().getFullYear();
      renderLinks(indexPages);
      renderLastUpdated();
    </script>
  </body>
</html>
